name: Daily Article Collection

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '수집할 키워드 (비워두면 내일의 키워드 자동 선택)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run article collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/collect.js "${{ github.event.inputs.keyword }}"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/keywords-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update keywords-data.json [$(date +%Y-%m-%d)]"
            git push
          fi

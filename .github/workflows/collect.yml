name: Daily Article Collection

on:
  schedule:
    - cron: '0 14 * * *'  # 매일 오후 11시 KST (UTC 14:00) — 다음날 키워드 미리 수집
  workflow_dispatch:
    inputs:
      keyword:
        description: '수집할 키워드 (비워두면 내일의 키워드 자동 선택)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run article collector agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            claude --agent article-collector "keyword: ${{ github.event.inputs.keyword }}"
          else
            claude --agent article-collector "collect tomorrow"
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/keywords-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update keywords-data.json [$(date +%Y-%m-%d)]"
            git push
          fi
